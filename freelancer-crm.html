<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreelancerOS — Bryttani Patterson</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0A0908;--bg2:#111010;--bg3:#1a1918;--bg4:#222120;
  --gold:#C9A84C;--gold-light:#e0c06a;--gold-dim:rgba(201,168,76,0.12);--gold-border:rgba(201,168,76,0.28);
  --text:#F5F0E8;--text-muted:#9a9490;--text-dim:#6b6660;
  --danger:#d95f5f;--success:#5b9e6d;--warning:#d4944a;--info:#6b8fde;
  --sidebar-w:252px;--radius:8px;--radius-lg:12px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;font-size:14px;line-height:1.6;overflow:hidden}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--gold-border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:26px 24px 20px;border-bottom:1px solid var(--gold-border)}
.sidebar-logo h1{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);letter-spacing:0.3px}
.sidebar-logo p{font-size:10px;color:var(--text-dim);font-weight:400;letter-spacing:1.8px;text-transform:uppercase;margin-top:3px}
.sidebar-nav{padding:12px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 22px;cursor:pointer;color:var(--text-muted);font-size:13px;font-weight:400;border-left:3px solid transparent;transition:all .18s;user-select:none}
.nav-item:hover{color:var(--text);background:var(--gold-dim)}
.nav-item.active{color:var(--gold);background:var(--gold-dim);border-left-color:var(--gold);font-weight:500}
.nav-item svg{flex-shrink:0;opacity:.75}
.nav-item.active svg{opacity:1}
.sidebar-footer{padding:14px 22px;border-top:1px solid var(--gold-border);font-size:10px;color:var(--text-dim);letter-spacing:.8px}

/* MAIN */
.main{flex:1;overflow-y:auto;background:var(--bg)}
.page-header{padding:26px 38px 20px;border-bottom:1px solid rgba(255,255,255,.055);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,9,8,.95);z-index:10;backdrop-filter:blur(12px)}
.page-title{font-family:'Playfair Display',serif;font-size:23px;font-weight:600;color:var(--text)}
.page-subtitle{font-size:11px;color:var(--text-dim);margin-top:3px;letter-spacing:1px;text-transform:uppercase}
.page-content{padding:28px 38px}

/* CARDS */
.card{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--radius-lg);padding:20px 22px}
.card-gold{border-color:var(--gold-border)}
.card-title{font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-dim);font-weight:600;margin-bottom:13px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:22px}
.stat-card{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--radius-lg);padding:18px 20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold) 0%,transparent 70%)}
.stat-label{font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;font-weight:600}
.stat-value{font-family:'Playfair Display',serif;font-size:28px;color:var(--text);font-weight:600;line-height:1}
.stat-value.gold{color:var(--gold)}
.stat-change{font-size:11px;color:var(--text-dim);margin-top:5px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border:none;border-radius:var(--radius);cursor:pointer;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;letter-spacing:.4px;transition:all .18s;white-space:nowrap;user-select:none}
.btn-gold{background:var(--gold);color:#0A0908;font-weight:600}
.btn-gold:hover{background:var(--gold-light);transform:translateY(-1px);box-shadow:0 4px 18px rgba(201,168,76,.22)}
.btn-outline{background:transparent;color:var(--text-muted);border:1px solid rgba(255,255,255,.11)}
.btn-outline:hover{border-color:var(--gold-border);color:var(--text)}
.btn-ghost{background:transparent;color:var(--text-muted);padding:7px 11px}
.btn-ghost:hover{color:var(--text);background:var(--bg3)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(217,95,95,.28);padding:8px 16px;font-size:13px}
.btn-danger:hover{background:rgba(217,95,95,.09)}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-icon{padding:6px;width:30px;height:30px;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn:disabled:hover{transform:none;box-shadow:none}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid rgba(255,255,255,.055)}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid rgba(255,255,255,.07);background:var(--bg3)}
th{padding:12px 15px;text-align:left;font-size:10px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-dim);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .13s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.025)}
tbody tr.row-selected{background:var(--gold-dim)!important}
td{padding:12px 15px;font-size:13px;color:var(--text-muted);vertical-align:middle}
td.primary{color:var(--text);font-weight:500}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;letter-spacing:.3px;white-space:nowrap}
.badge-lead{background:rgba(100,130,200,.13);color:#7b9de0;border:1px solid rgba(100,130,200,.22)}
.badge-proposal{background:rgba(201,168,76,.13);color:var(--gold);border:1px solid var(--gold-border)}
.badge-active,.badge-converted,.badge-published{background:rgba(91,158,109,.14);color:#68b87e;border:1px solid rgba(91,158,109,.24)}
.badge-completed{background:rgba(130,180,140,.1);color:#7daa88;border:1px solid rgba(130,180,140,.18)}
.badge-lost,.badge-unpaid,.badge-not-interested{background:rgba(217,95,95,.1);color:#c97070;border:1px solid rgba(217,95,95,.2)}
.badge-deposit,.badge-emailed,.badge-scheduled{background:rgba(201,168,76,.12);color:var(--gold);border:1px solid var(--gold-border)}
.badge-paid{background:rgba(91,158,109,.14);color:#68b87e;border:1px solid rgba(91,158,109,.24)}
.badge-not-contacted,.badge-draft{background:rgba(255,255,255,.07);color:var(--text-dim);border:1px solid rgba(255,255,255,.1)}
.badge-followed-up{background:rgba(180,120,220,.13);color:#c090e0;border:1px solid rgba(180,120,220,.22)}
.badge-call-scheduled{background:rgba(100,170,220,.13);color:#70bce0;border:1px solid rgba(100,170,220,.22)}
.badge-showcase{background:rgba(201,168,76,.12);color:var(--gold);border:1px solid var(--gold-border)}
.badge-value{background:rgba(100,130,200,.13);color:#7b9de0;border:1px solid rgba(100,130,200,.22)}
.badge-bts{background:rgba(180,120,220,.13);color:#c090e0;border:1px solid rgba(180,120,220,.22)}
.badge-social-proof{background:rgba(91,158,109,.14);color:#68b87e;border:1px solid rgba(91,158,109,.24)}
.badge-opinion{background:rgba(212,148,74,.13);color:var(--warning);border:1px solid rgba(212,148,74,.22)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--gold-border);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-lg{max-width:700px}
.modal-xl{max-width:860px}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:3px;border-radius:4px;transition:color .15s}
.modal-close:hover{color:var(--text)}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-field.full{grid-column:1/-1}
label{font-size:10px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-dim)}
input,select,textarea{background:var(--bg3);border:1px solid rgba(255,255,255,.09);border-radius:var(--radius);color:var(--text);font-family:'Jost',sans-serif;font-size:13px;padding:10px 12px;outline:none;transition:border-color .18s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input::placeholder,textarea::placeholder{color:var(--text-dim)}
select option{background:var(--bg3);color:var(--text)}
textarea{resize:vertical;min-height:76px}
.form-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.055)}

/* FILTERS */
.filter-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.filter-tab{padding:6px 14px;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.09);background:transparent;color:var(--text-muted);transition:all .18s;font-family:'Jost',sans-serif;user-select:none}
.filter-tab:hover{border-color:var(--gold-border);color:var(--text)}
.filter-tab.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}

/* PROGRESS */
.progress-bar{height:5px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:100px;transition:width .5s ease}

/* EMPTY STATE */
.empty-state{text-align:center;padding:52px 36px;color:var(--text-dim)}
.empty-state-icon{font-size:42px;margin-bottom:13px;opacity:.45}
.empty-state h3{font-family:'Playfair Display',serif;font-size:17px;color:var(--text-muted);margin-bottom:7px}
.empty-state p{font-size:13px;max-width:280px;margin:0 auto 16px;line-height:1.75}

/* LAYOUT */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.flex{display:flex;align-items:center}
.gap-8{gap:8px}
.gap-12{gap:12px}
.mt-16{margin-top:16px}
.mt-20{margin-top:20px}
.w-full{width:100%}
hr.divider{border:none;border-top:1px solid rgba(255,255,255,.055);margin:16px 0}

/* PROJECTS */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
.project-card{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--radius-lg);padding:20px;transition:border-color .18s}
.project-card:hover{border-color:var(--gold-border)}
.project-client{font-family:'Playfair Display',serif;font-size:15px;color:var(--text);font-weight:600}
.project-type{font-size:12px;color:var(--text-muted);margin-top:2px}
.project-meta{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:12px 0}
.project-meta-item label{display:block;font-size:9px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-dim);margin-bottom:2px}
.project-meta-item span{font-size:13px;color:var(--text-muted)}
.deliverables-title{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;font-weight:600}
.deliverable-item{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer}
.deliverable-item:last-child{border-bottom:none}
.deliverable-item.done span{text-decoration:line-through;color:var(--text-dim)}
.checkbox{width:15px;height:15px;border:1.5px solid rgba(255,255,255,.18);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.checkbox.checked{background:var(--gold);border-color:var(--gold)}

/* PROPOSAL */
.proposal-layout{display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:start}
.proposal-preview{background:var(--bg2);border:1px solid var(--gold-border);border-radius:var(--radius-lg);overflow:hidden}
.proposal-header{background:linear-gradient(140deg,#1c1710 0%,#231d10 100%);padding:26px 28px;border-bottom:1px solid var(--gold-border);text-align:center}
.proposal-header h2{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);margin-bottom:3px}
.proposal-header p{font-size:11px;color:var(--text-dim);letter-spacing:1.2px;text-transform:uppercase}
.proposal-body{padding:26px 28px}
.proposal-sec{margin-bottom:20px}
.proposal-sec h4{font-family:'Playfair Display',serif;font-size:13px;color:var(--gold);margin-bottom:7px;padding-bottom:6px;border-bottom:1px solid rgba(201,168,76,.18)}
.proposal-sec p{font-size:13px;color:var(--text-muted);line-height:1.75}
.proposal-price-box{background:var(--bg3);border:1px solid var(--gold-border);border-radius:var(--radius);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.proposal-price-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim)}
.proposal-price-value{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);font-weight:600}
.proposal-footer{padding:14px 28px;border-top:1px solid rgba(255,255,255,.055);text-align:center;font-size:11px;color:var(--text-dim);letter-spacing:.5px}

/* INCOME */
.income-layout{display:grid;grid-template-columns:1fr 350px;gap:24px;align-items:start}
.income-stats{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:18px}
.bar-chart-wrap{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--radius-lg);padding:20px 22px;margin-bottom:18px}
.payment-item{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.payment-item:last-child{border-bottom:none}

/* DETAIL PANEL */
.detail-panel{position:fixed;right:0;top:0;bottom:0;width:370px;background:var(--bg2);border-left:1px solid var(--gold-border);z-index:100;overflow-y:auto;padding:26px 24px;transform:translateX(100%);transition:transform .28s ease}
.detail-panel.open{transform:translateX(0)}
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:99}
.detail-field{margin-bottom:14px}
.detail-field label{display:block;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text-dim);margin-bottom:2px}
.detail-field p{font-size:14px;color:var(--text-muted);line-height:1.65}

/* FOLLOW-UPS */
.followup-item{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.045)}
.followup-item:last-child{border-bottom:none}
.followup-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0}
.followup-dot.overdue{background:var(--danger)}
.followup-dot.today{background:var(--warning)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--gold-border);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--gold);font-family:'Playfair Display',serif;font-weight:600;flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--gold-border);border-radius:var(--radius);padding:12px 16px;font-size:13px;color:var(--text);z-index:9999;display:flex;align-items:center;gap:8px;animation:fadeUp .25s ease}

/* OUTREACH */
.outreach-layout{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start}
.template-box{background:var(--bg3);border:1px solid rgba(255,255,255,.09);border-radius:var(--radius);padding:14px 16px;font-size:12px;color:var(--text-muted);line-height:1.8;white-space:pre-wrap;min-height:200px;font-family:'Jost',sans-serif;max-height:380px;overflow-y:auto}
.overdue-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(217,95,95,.12);color:var(--danger);border:1px solid rgba(217,95,95,.22);border-radius:100px;padding:2px 9px;font-size:10px;font-weight:600;letter-spacing:.5px}

/* LINKEDIN */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:16px}
.cal-day{background:var(--bg3);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);min-height:90px;padding:10px 10px 8px;cursor:pointer;transition:border-color .18s}
.cal-day:hover{border-color:var(--gold-border)}
.cal-day.today{border-color:var(--gold);background:var(--gold-dim)}
.cal-day-label{font-size:10px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:600}
.cal-day-date{font-family:'Playfair Display',serif;font-size:16px;color:var(--text-muted);margin-bottom:7px}
.cal-day.today .cal-day-date{color:var(--gold)}
.cal-post-chip{background:rgba(201,168,76,.14);border:1px solid var(--gold-border);border-radius:5px;padding:3px 7px;font-size:10px;color:var(--text-muted);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.cal-post-chip.published{background:rgba(91,158,109,.14);border-color:rgba(91,158,109,.24);color:#68b87e}
.cal-post-chip.draft{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.09);color:var(--text-dim)}
.post-card{background:var(--bg2);border:1px solid rgba(255,255,255,.055);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:12px;transition:border-color .18s}
.post-card:hover{border-color:var(--gold-border)}
.idea-card{background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius);padding:13px 15px;cursor:pointer;transition:all .18s;margin-bottom:8px}
.idea-card:hover{border-color:var(--gold-border);background:var(--gold-dim)}
.streak-badge{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,#2a1f08,#1f1a0a);border:1px solid var(--gold-border);border-radius:var(--radius);padding:10px 16px}
.streak-number{font-family:'Playfair Display',serif;font-size:26px;color:var(--gold);font-weight:700;line-height:1}

/* GOAL EDITOR */
.goal-edit-btn{background:none;border:none;color:var(--text-dim);font-size:11px;cursor:pointer;font-family:'Jost',sans-serif;letter-spacing:.4px;text-decoration:underline;transition:color .15s;margin-top:2px}
.goal-edit-btn:hover{color:var(--gold)}
.goal-inline{display:flex;gap:6px;align-items:center;margin-top:3px}

/* ADD DELIVERABLE */
.add-del{display:flex;gap:7px;margin-top:7px}
.add-del input{flex:1;padding:7px 11px;font-size:12px}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.09);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(201,168,76,.28)}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeUp .28s ease forwards}

@media print{.sidebar,.page-header,.proposal-form-col{display:none!important}.main{overflow:visible}.proposal-preview{border:none;box-shadow:none}body{background:white!important;color:black!important}.proposal-header{background:#f5f0e0!important}}
@media(max-width:1100px){:root{--sidebar-w:200px}.stats-grid{grid-template-columns:1fr 1fr}.proposal-layout,.income-layout,.outreach-layout{grid-template-columns:1fr}}
@media(max-width:720px){.page-content{padding:18px 16px}.page-header{padding:16px}.stats-grid{grid-template-columns:1fr}.two-col{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.detail-panel{width:100%}.projects-grid{grid-template-columns:1fr}.cal-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef} = React;

/* ── UTILS ── */
function useLS(key,def){
  const [v,setV]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):def}catch{return def}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(v))}catch{}},[key,v]);
  return[v,setV];
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fmtDate(d){if(!d)return'—';try{return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}catch{return d}}
function fmtCur(n){return'$'+(Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}
function todayStr(){return new Date().toISOString().split('T')[0]}
function monthKey(d){return d?d.slice(0,7):''}
function getWeekDays(offset){
  const d=new Date();d.setHours(0,0,0,0);
  const day=d.getDay();const mon=new Date(d);
  mon.setDate(d.getDate()-(day===0?6:day-1)+offset*7);
  return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x});
}

/* ── SHARED ── */
function Badge({status}){
  const map={'Lead':'badge-lead','Proposal Sent':'badge-proposal','Active':'badge-active','Completed':'badge-completed','Lost':'badge-lost','Unpaid':'badge-unpaid','Deposit Paid':'badge-deposit','Paid in Full':'badge-paid','Not Contacted':'badge-not-contacted','Emailed':'badge-emailed','Followed Up':'badge-followed-up','Call Scheduled':'badge-call-scheduled','Converted':'badge-converted','Not Interested':'badge-not-interested','Draft':'badge-draft','Scheduled':'badge-scheduled','Published':'badge-published','Project Showcase':'badge-showcase','Value Post':'badge-value','Behind the Scenes':'badge-bts','Social Proof':'badge-social-proof','Opinion':'badge-opinion'};
  return <span className={`badge ${map[status]||'badge-draft'}`}>{status}</span>;
}
function Modal({open,onClose,title,children,large,xl}){
  if(!open)return null;
  return <div className="modal-overlay"onClick={e=>e.target===e.currentTarget&&onClose()}><div className={`modal ${xl?'modal-xl':large?'modal-lg':''} animate-in`}><div className="modal-title"><span>{title}</span><button className="modal-close"onClick={onClose}><Ic.x/></button></div>{children}</div></div>;
}
function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2600);return()=>clearTimeout(t)},[]);
  return <div className="toast"><span style={{color:'var(--gold)'}}>✓</span>{msg}</div>;
}
function GoalEditor({settings,setSettings}){
  const[editing,setEditing]=useState(false);const[val,setVal]=useState(settings.monthlyGoal||5000);
  if(!editing)return <button className="goal-edit-btn"onClick={()=>{setVal(settings.monthlyGoal||5000);setEditing(true)}}>Edit goal</button>;
  return <div className="goal-inline"><input type="number"value={val}onChange={e=>setVal(e.target.value)}style={{width:88,padding:'4px 8px',fontSize:12}}autoFocus/><button className="btn btn-gold btn-sm"onClick={()=>{setSettings({...settings,monthlyGoal:Number(val)});setEditing(false)}}>Save</button><button className="btn btn-ghost btn-sm"onClick={()=>setEditing(false)}>✕</button></div>;
}

/* ── DASHBOARD ── */
function Dashboard({clients,projects,payments,outreach,settings,setSettings}){
  const thisMonth=todayStr().slice(0,7);
  const monthlyRev=payments.filter(p=>monthKey(p.date)===thisMonth).reduce((s,p)=>s+(Number(p.amount)||0),0);
  const annualRev=payments.reduce((s,p)=>s+(Number(p.amount)||0),0);
  const goal=settings.monthlyGoal||5000;
  const goalPct=Math.min((monthlyRev/goal)*100,100);
  const now=new Date();now.setHours(0,0,0,0);
  function fuStatus(d){const dt=new Date(d+'T12:00:00');dt.setHours(0,0,0,0);if(dt<now)return'overdue';if(dt.getTime()===now.getTime())return'today';return'upcoming'}
  const followUps=[...clients].filter(c=>c.followUpDate).sort((a,b)=>a.followUpDate.localeCompare(b.followUpDate)).slice(0,5);
  const outreachDue=outreach.filter(o=>o.followUpDate&&o.followUpDate<=todayStr()&&o.status!=='Converted'&&o.status!=='Not Interested').length;
  const recentClients=[...clients].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')).slice(0,5);
  return(
    <div className="animate-in">
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-label">Total Leads</div><div className="stat-value">{clients.length}</div><div className="stat-change">{clients.filter(c=>c.status==='Active').length} active clients</div></div>
        <div className="stat-card"><div className="stat-label">Active Projects</div><div className="stat-value">{projects.length}</div><div className="stat-change">{projects.filter(p=>p.paymentStatus==='Unpaid').length} awaiting payment</div></div>
        <div className="stat-card"><div className="stat-label">Revenue This Month</div><div className="stat-value gold">{fmtCur(monthlyRev)}</div><div className="stat-change">of {fmtCur(goal)} goal</div></div>
        <div className="stat-card"><div className="stat-label">Annual Total</div><div className="stat-value gold">{fmtCur(annualRev)}</div><div className="stat-change">{payments.length} payments logged</div></div>
      </div>
      <div className="card card-gold"style={{marginBottom:20}}>
        <div className="flex-between"style={{marginBottom:9}}>
          <div><div className="card-title"style={{marginBottom:2}}>Monthly Revenue Goal</div><div style={{fontSize:13,color:'var(--text-muted)'}}>{fmtCur(monthlyRev)} <span style={{color:'var(--text-dim)'}}>of</span> {fmtCur(goal)}</div><GoalEditor settings={settings}setSettings={setSettings}/></div>
          <div style={{fontFamily:'Playfair Display,serif',fontSize:26,color:'var(--gold)',fontWeight:600}}>{Math.round(goalPct)}%</div>
        </div>
        <div className="progress-bar"><div className="progress-fill"style={{width:goalPct+'%'}}/></div>
      </div>
      {outreachDue>0&&<div style={{background:'rgba(217,95,95,.08)',border:'1px solid rgba(217,95,95,.22)',borderRadius:'var(--radius)',padding:'12px 16px',marginBottom:20,fontSize:13,color:'var(--danger)',display:'flex',alignItems:'center',gap:10}}>⚠ <strong>{outreachDue}</strong> outreach follow-up{outreachDue>1?'s':''} overdue — check your Outreach Manager.</div>}
      <div className="two-col">
        <div className="card"><div className="card-title">Upcoming Follow-ups</div>
          {followUps.length===0?<div style={{color:'var(--text-dim)',fontSize:13,padding:'10px 0'}}>No follow-ups scheduled.</div>
          :followUps.map(c=>{const st=fuStatus(c.followUpDate);return(
            <div key={c.id}className="followup-item">
              <div className={`followup-dot ${st}`}/>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,color:'var(--text)',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</div><div style={{fontSize:11,color:'var(--text-dim)',marginTop:1}}>{c.service||'No service'}</div></div>
              <div style={{textAlign:'right',flexShrink:0}}><div style={{fontSize:11,color:st==='overdue'?'var(--danger)':st==='today'?'var(--warning)':'var(--text-muted)',marginBottom:3}}>{st==='overdue'?'Overdue':st==='today'?'Today':fmtDate(c.followUpDate)}</div><Badge status={c.status}/></div>
            </div>
          )})}
        </div>
        <div className="card"><div className="card-title">Recent Leads & Clients</div>
          {recentClients.length===0?<div style={{color:'var(--text-dim)',fontSize:13,padding:'10px 0'}}>No clients yet.</div>
          :recentClients.map(c=>(
            <div key={c.id}className="followup-item">
              <div className="avatar">{(c.name||'?').charAt(0).toUpperCase()}</div>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,color:'var(--text)',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</div><div style={{fontSize:11,color:'var(--text-dim)',marginTop:1}}>{c.business||c.email||'—'}</div></div>
              <Badge status={c.status}/>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

          <td>{c.followUpDate?<span style={{display:'flex',alignItems:'center',gap:4,fontSize:12,color:'var(--text-dim)'}}><Ic.cal/>{fmtDate(c.followUpDate)}</span>:'—'}</td>

        </tr>)}
      </tbody></table></div>}
      {sel&&<><div className="panel-overlay"onClick={()=>setPanel(null)}/><div className="detail-panel open animate-in">
        <div className="flex-between"style={{marginBottom:18}}><div><div style={{fontFamily:'Playfair Display,serif',fontSize:18,color:'var(--text)',fontWeight:600}}>{sel.name}</div>{sel.business&&<div style={{fontSize:12,color:'var(--text-dim)',marginTop:2}}>{sel.business}</div>}</div><button className="btn btn-ghost btn-icon"onClick={()=>setPanel(null)}><Ic.x/></button></div>
        <Badge status={sel.status}/><hr className="divider"/>

        {sel.notes&&<div className="detail-field"><label>Notes</label><p>{sel.notes}</p></div>}

const PS=['Unpaid','Deposit Paid','Paid in Full'];
const EP={id:'',clientName:'',projectType:'',startDate:'',deadline:'',paymentStatus:'Unpaid',deliverables:[],notes:''};
function ProjectManager({projects,setProjects,clients}){
  const[modal,setModal]=useState(false);const[isEdit,setIsEdit]=useState(false);const[form,setForm]=useState(EP);const[di,setDi]=useState('');const[toast,setToast]=useState('');
  function openAdd(){setForm({...EP,id:uid(),deliverables:[]});setIsEdit(false);setModal(true);setDi('')}

function calcStreak(posts){
  const pub=posts.filter(p=>p.status==='Published'&&p.scheduledDate);
  if(!pub.length)return{current:0,best:0};
  function weekStart(d){const day=d.getDay();const diff=d.getDate()-(day===0?6:day-1);return new Date(d.getFullYear(),d.getMonth(),diff).toISOString().split('T')[0]}
  const weeks=new Set(pub.map(p=>weekStart(new Date(p.scheduledDate+'T12:00:00'))));
  const thisWk=weekStart(new Date());
  let curr=0;let check=new Date(thisWk+'T12:00:00');
  while(true){const k=weekStart(check);if(weeks.has(k)){curr++;check.setDate(check.getDate()-7)}else break}
  const sorted=[...weeks].sort();let best=curr,run=1;
  for(let i=1;i<sorted.length;i++){const prev=new Date(sorted[i-1]+'T12:00:00');const cur=new Date(sorted[i]+'T12:00:00');const diff=Math.round((cur-prev)/(1000*60*60*24*7));if(diff===1){run++;best=Math.max(best,run)}else run=1}
  return{current:curr,best:Math.max(best,1)};
}

          {section==='projects'&&<ProjectManager projects={projects}setProjects={setProjects}clients={clients}/>}
          {section==='proposals'&&<ProposalBuilder clients={clients}/>}
          {section==='income'&&<IncomeTracker payments={payments}setPayments={setPayments}settings={settings}setSettings={setSettings}clients={clients}/>}
          {section==='outreach'&&<OutreachManager outreach={outreach}setOutreach={setOutreach}/>}
          {section==='linkedin'&&<LinkedInPlanner posts={posts}setPosts={setPosts}/>}
        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
